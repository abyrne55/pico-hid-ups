name: Deploy Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y doxygen
      - run: doxygen Doxyfile
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/html
      - uses: actions/deploy-pages@v4
